<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Online Store</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#111; color:#fff; padding:15px; text-align:center;}
.container {padding:20px;}
.products {display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px;}
.card {background:#fff; padding:15px; border-radius:10px; box-shadow:0 5px 10px rgba(0,0,0,0.1);}
button {background:#111; color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;}
.cart {position:fixed; top:10px; right:10px; background:#fff; padding:15px; border-radius:10px; width:260px; box-shadow:0 5px 15px rgba(0,0,0,0.2);} 
.cart h3 {margin-top:0;}
.checkout {background:#0084FF; margin-top:10px; width:100%;}
input {width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc;}
small {color:#666;}
</style>
</head>
<body>
<header>
<h1>My Online Store</h1>
</header>

<div class="container">
<div class="products" id="productList"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: ₱<span id="total">0</span></p>

<label>Messenger Page Username</label>
<input type="text" id="pageName" placeholder="e.g. YourPageName">
<small>Example: facebook.com/YourPageName</small>

<button class="checkout" onclick="messengerCheckout()">Checkout via Messenger</button>
</div>

<script>
const products = [
 {name:"Bag", price:499},
 {name:"Shoes", price:899},
 {name:"Watch", price:699},
 {name:"Perfume", price:599}
];

let cart = [];

function displayProducts(){
 const container = document.getElementById("productList");
 container.innerHTML = "";
 products.forEach((p,i)=>{
  container.innerHTML += `
   <div class="card">
    <h3>${p.name}</h3>
    <p>₱${p.price}</p>
    <button onclick="addToCart(${i})">Add to Cart</button>
   </div>
  `;
 });
}

function addToCart(index){
 cart.push(products[index]);
 updateCart();
}

function updateCart(){
 const list = document.getElementById("cartItems");
 const total = document.getElementById("total");
 list.innerHTML = "";
 let sum = 0;

 cart.forEach((item)=>{
  sum += item.price;
  list.innerHTML += `<li>${item.name} - ₱${item.price}</li>`;
 });

 total.textContent = sum;
}

function messengerCheckout(){
 if(cart.length === 0){
  alert("Cart is empty!");
  return;
 }

 const page = document.getElementById("pageName").value.trim();
 if(!page){
  alert("Please enter your Messenger page username.");
  return;
 }

 let message = "Hello! I want to order:\n\n";
 let total = 0;

 cart.forEach(item => {
  message += `• ${item.name} - ₱${item.price}\n`;
  total += item.price;
 });

 message += `\nTotal: ₱${total}\n\nName:\nAddress:\nContact Number:`;

 const encodedMessage = encodeURIComponent(message);
 const url = `https://m.me/${shopeeaffiliatetips}?ref=${encodedMessage}`;

 window.open(url, '_blank');
}

displayProducts();
</script>

</body>
</html>
