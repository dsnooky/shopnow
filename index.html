<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Online Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f5f5;color:#333}
header{background:#111;color:#fff;padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:24px}
nav a{color:#fff;margin-left:20px;text-decoration:none}
.hero{height:90vh;background:linear-gradient(to right,#000000aa,#000000aa),url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center}
.hero h2{font-size:48px;margin-bottom:10px}
.hero p{font-size:18px;margin-bottom:20px}
.btn{background:#ff6600;color:#fff;padding:12px 25px;border:none;border-radius:30px;text-decoration:none;cursor:pointer;transition:0.3s;display:inline-block}
.btn:hover{background:#e65c00}
.section{padding:60px 40px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:left}
.card img{width:100%;border-radius:10px}
.card h3{margin:10px 0;font-size:18px}
.price{font-weight:bold;margin:10px 0}
.footer{background:#111;color:#fff;padding:20px;text-align:center}
.loader{margin-top:20px}
</style>
</head>
<body>

<header>
<h1>MyStore</h1>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Shop Smarter, Live Better</h2>
<p>Discover trending products at the best prices</p>
<a href="#products" class="btn">Shop Now</a>
</section>

<section class="section" id="products">
<h2>Latest Products</h2>
<div id="productGrid" class="products"></div>
<div class="loader" id="loader">Loading products...</div>
</section>

<section class="section" id="contact">
<h2>Contact Us</h2>
<p>Email: yourstore@email.com</p>
<p>Messenger: m.me/yourstore</p>
</section>

<footer class="footer">
<p>© 2026 MyStore. All Rights Reserved.</p>
</footer>

<script>
// ⚠️ IMPORTANT: Replace SHOP_ID with your Shopee Shop ID
const SHOP_ID = 123456789; 

async function loadShopeeProducts(){
    const grid = document.getElementById('productGrid');
    const loader = document.getElementById('loader');

    try{
        const response = await fetch(`https://shopee.ph/api/v4/shop/get_shop_detail?shopid=${SHOP_ID}`);
        const data = await response.json();

        // Fallback demo products (Shopee blocks direct frontend sometimes)
        const products = [
            {
                name: "Viral Bag",
                price: "₱299",
                image: "https://via.placeholder.com/300",
                link: "https://shopee.ph"
            },
            {
                name: "Beauty Set",
                price: "₱499",
                image: "https://via.placeholder.com/300",
                link: "https://shopee.ph"
            },
            {
                name: "Mini Handbag",
                price: "₱199",
                image: "https://via.placeholder.com/300",
                link: "https://shopee.ph"
            }
        ];

        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price}</div>
                    <a href="${p.link}" target="_blank" class="btn">Buy Now</a>
                </div>
            `;
        });

        loader.style.display = 'none';

    } catch(error){
        loader.innerText = "Failed to load products. Add manual links.";
    }
}

loadShopeeProducts();
</script>

</body>
</html>
