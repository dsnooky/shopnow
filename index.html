<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Online Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f5f5;color:#333}
header{background:#111;color:#fff;padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:24px}
nav a{color:#fff;margin-left:20px;text-decoration:none}
.hero{height:90vh;background:linear-gradient(to right,#000000aa,#000000aa),url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center}
.hero h2{font-size:48px;margin-bottom:10px}
.hero p{font-size:18px;margin-bottom:20px}
.btn{background:#ff6600;color:#fff;padding:12px 25px;border:none;border-radius:30px;text-decoration:none;cursor:pointer;transition:0.3s}
.btn:hover{background:#e65c00}
.section{padding:60px 40px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.card img{width:100%;border-radius:10px}
.card h3{margin:10px 0}
.card p{font-size:14px;color:#777}
.footer{background:#111;color:#fff;padding:20px;text-align:center}
</style>
</head>
<body>

<header>
<h1>MyStore</h1>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Shop Smarter, Live Better</h2>
<p>Discover trending products at the best prices</p>
<a href="#products" class="btn">Shop Now</a>
</section>

<section class="section" id="products">
<h2>Featured Products</h2>
<div class="products">
<div class="card">
<img src="https://via.placeholder.com/300" alt="Product">
