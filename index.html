<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Online Store</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#111; color:#fff; padding:15px; text-align:center;}
.container {padding:20px;}
.products {display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:20px;}
.card {background:#fff; padding:15px; border-radius:10px; box-shadow:0 5px 10px rgba(0,0,0,0.1);}
button {background:#111; color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;}
.cart {position:fixed; top:10px; right:10px; background:#fff; padding:15px; border-radius:10px; width:250px; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.cart h3 {margin-top:0;}
.checkout {background:green; margin-top:10px; width:100%;}
</style>
</head>
<body>
<header>
<h1>My Online Store</h1>
</header>

<div class="container">
<div class="products" id="productList"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: ₱<span id="total">0</span></p>
<button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
const products = [
 {name:"Bag", price:499},
 {name:"Shoes", price:899},
 {name:"Watch", price:699},
 {name:"Perfume", price:599}
];

let cart = [];

function displayProducts(){
 const container = document.getElementById("productList");
 products.forEach((p,i)=>{
  container.innerHTML += `
   <div class="card">
    <h3>${p.name}</h3>
    <p>₱${p.price}</p>
    <button onclick="addToCart(${i})">Add to Cart</button>
   </div>
  `;
 });
}

function addToCart(index){
 cart.push(products[index]);
 updateCart();
}

function updateCart(){
 const list = document.getElementById("cartItems");
 const total = document.getElementById("total");
 list.innerHTML = "";
 let sum = 0;
 cart.forEach((item,i)=>{
  sum += item.price;
  list.innerHTML += `<li>${item.name} - ₱${item.price}</li>`;
 });
 total.textContent = sum;
}

function checkout(){
 if(cart.length === 0){
  alert("Cart is empty!");
  return;
 }
 alert("Order placed! Total: ₱" + document.getElementById("total").textContent);
 cart = [];
 updateCart();
}

displayProducts();
</script>

</body>
</html>
